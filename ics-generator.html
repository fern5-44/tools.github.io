<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICS Kalender-Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      margin: 0;
      padding: calc(50px + 2rem) 1rem 3rem;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 1.5rem;
    }
    .calname-row {
      margin-bottom: 1.25rem;
    }
    label {
      font-size: 12px;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    input, textarea {
      width: 100%;
      font-size: 14px;
      font-family: inherit;
      padding: 7px 10px;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #1a1a18;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus {
      border-color: #888;
    }
    textarea {
      resize: vertical;
      min-height: 56px;
    }
    .event-card {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 12px;
      position: relative;
    }
    .event-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .full { grid-column: 1 / -1; }
    .remove-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #999;
      padding: 0;
      line-height: 1;
    }
    .remove-btn:hover { color: #333; }
    button {
      font-family: inherit;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      border: 0.5px solid #ccc;
      background: #fff;
      color: #1a1a18;
      transition: background 0.1s;
    }
    button:hover { background: #f0f0ee; }
    .add-btn {
      width: 100%;
      margin-bottom: 1rem;
    }
    .dl-btn {
      width: 100%;
      font-size: 15px;
      padding: 10px;
      background: #e6f1fb;
      color: #185fa5;
      border: none;
      border-radius: 8px;
      font-weight: 500;
    }
    .dl-btn:hover { background: #cce0f5; }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
      text-align: center;
    }
    .event-num {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      margin-bottom: 10px;
    }

    /* ── Shared nav chrome ── */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:400; }
    .overlay.show { display:block; }
    .sidenav { height:100%; width:0; position:fixed; z-index:500; top:0; left:0; background:#fff; border-right:0.5px solid #e2e2df; overflow-x:hidden; transition:width .25s cubic-bezier(.4,0,.2,1); padding-top:64px; box-shadow:2px 0 24px rgba(0,0,0,.05); }
    .sidenav.open { width:240px; }
    .sidenav-label { padding:1.1rem 28px 4px; font-family:'DM Mono',monospace; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:#185fa5; opacity:.85; }
    .sidenav a { display:block; padding:9px 28px; font-family:'DM Mono',monospace; font-size:13px; color:#888; text-decoration:none; letter-spacing:.02em; white-space:nowrap; transition:color .12s, padding-left .12s; }
    .sidenav a:hover { color:#1a1a18; padding-left:32px; }
    .sidenav a.active { color:#185fa5; }
    .sidenav .closebtn { position:absolute; top:16px; right:18px; font-family:'DM Mono',monospace; font-size:13px; color:#888; cursor:pointer; background:none; border:none; padding:0; transition:color .12s; }
    .sidenav .closebtn:hover { color:#185fa5; }
    .topnav { position:fixed; top:0; left:0; right:0; height:50px; z-index:300; display:flex; align-items:center; padding:0 2rem; background:rgba(245,245,243,.85); backdrop-filter:blur(12px); border-bottom:0.5px solid #e2e2df; }
    .nav-logo { font-family:'DM Mono',monospace; font-size:12px; color:#185fa5; text-decoration:none; letter-spacing:.08em; opacity:.9; margin-right:auto; }
    .topnav-links { display:flex; list-style:none; align-items:center; gap:2px; margin:0; padding:0; }
    .topnav-links a { font-family:'DM Mono',monospace; font-size:11px; color:#888; text-decoration:none; padding:5px 12px; border-radius:5px; letter-spacing:.04em; transition:color .15s; }
    .topnav-links a:hover { color:#1a1a18; }
    .hamburger { display:flex; flex-direction:column; gap:5px; cursor:pointer; padding:6px; background:none; border:none; margin-left:8px; }
    .hamburger span { display:block; width:18px; height:1px; background:#999; transition:transform .2s, opacity .2s, background .12s; }
    .hamburger:hover span { background:#185fa5; }
    .hamburger.open span:nth-child(1){ transform:translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2){ opacity:0; }
    .hamburger.open span:nth-child(3){ transform:translateY(-6px) rotate(-45deg); }

    @media (max-width: 480px) {
      .event-grid { grid-template-columns: 1fr; }
      .full { grid-column: 1; }
      .topnav { padding: 0 1.25rem; }
      .topnav-links { display:none; }
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeNav()"></div>
<div class="sidenav" id="sidenav">
  <button class="closebtn" onclick="closeNav()">[ close ]</button>
  <div class="sidenav-label">Pages</div>
  <a href="index.html">Home</a>
  <a href="index.html#tools">Tools</a>
  <a href="index.html#about">About</a>
  <a href="index.html#contact">Contact</a>
  
</div>
<nav class="topnav">
  <a href="index.html" class="nav-logo">tools/</a>
  <ul class="topnav-links">
    <li><a href="index.html#tools">tools</a></li>
    <li><a href="index.html#about">about</a></li>
    <li><a href="index.html#contact">contact</a></li>
  </ul>
  <button class="hamburger" id="hamburger" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="container">
  <h1>ICS Kalender-Generator</h1>

  <div class="calname-row">
    <label>Kalender-Name</label>
    <input type="text" id="calname" value="Meine Termine" />
  </div>

  <div id="events"></div>

  <button class="add-btn" onclick="addEvent()">+ Termin hinzufügen</button>
  <button class="dl-btn" onclick="downloadICS()">ICS-Datei herunterladen</button>
  <p class="hint">Die Datei auf einen Webserver / GitHub Gist hochladen → QR-Code auf den Link generieren</p>
</div>

<script>
  function toggleNav(){var s=document.getElementById('sidenav'),o=document.getElementById('overlay'),b=document.getElementById('hamburger');var open=s.classList.contains('open');s.classList.toggle('open',!open);o.classList.toggle('show',!open);b.classList.toggle('open',!open);}
  function closeNav(){document.getElementById('sidenav').classList.remove('open');document.getElementById('overlay').classList.remove('show');document.getElementById('hamburger').classList.remove('open');}

  let eventCount = 0;

  function pad(n) { return String(n).padStart(2, '0'); }

  function toICSDate(dateStr, timeStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T' + (timeStr || '00:00'));
    return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) +
           'T' + pad(d.getHours()) + pad(d.getMinutes()) + '00';
  }

  function addEvent(data) {
    const id = ++eventCount;
    const d = data || {};
    const div = document.createElement('div');
    div.className = 'event-card';
    div.id = 'ev-' + id;
    div.innerHTML = `
      <button class="remove-btn" onclick="document.getElementById('ev-${id}').remove()" title="Entfernen">✕</button>
      <div class="event-num">Termin ${id}</div>
      <div class="event-grid">
        <div class="full">
          <label>Titel *</label>
          <input type="text" class="ev-title" value="${d.title || ''}" placeholder="z.B. Vereinstreffen" />
        </div>
        <div>
          <label>Datum *</label>
          <input type="date" class="ev-date" value="${d.date || ''}" />
        </div>
        <div>
          <label>Uhrzeit (optional)</label>
          <input type="time" class="ev-time" value="${d.time || ''}" />
        </div>
        <div>
          <label>Enddatum</label>
          <input type="date" class="ev-edate" value="${d.edate || ''}" />
        </div>
        <div>
          <label>Endzeit</label>
          <input type="time" class="ev-etime" value="${d.etime || ''}" />
        </div>
        <div class="full">
          <label>Ort</label>
          <input type="text" class="ev-loc" value="${d.loc || ''}" placeholder="z.B. Vereinshaus, Musterstrasse 1" />
        </div>
        <div class="full">
          <label>Beschreibung</label>
          <textarea class="ev-desc">${d.desc || ''}</textarea>
        </div>
      </div>
    `;
    document.getElementById('events').appendChild(div);
  }

  function uid() {
    return Math.random().toString(36).substr(2, 9) + '-' +
           Date.now().toString(36) + '@ics-generator';
  }

  function escapeICS(s) {
    return (s || '')
      .replace(/\\/g, '\\\\')
      .replace(/;/g, '\\;')
      .replace(/,/g, '\\,')
      .replace(/\n/g, '\\n');
  }

  function downloadICS() {
    const cards = document.querySelectorAll('.event-card');
    if (!cards.length) {
      alert('Bitte mindestens einen Termin hinzufügen.');
      return;
    }

    const calname = document.getElementById('calname').value.trim() || 'Termine';
    let lines = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//ICS Generator//DE',
      'CALSCALE:GREGORIAN',
      'METHOD:PUBLISH',
      'X-WR-CALNAME:' + escapeICS(calname),
    ];

    let valid = true;

    cards.forEach(card => {
      const title = card.querySelector('.ev-title').value.trim();
      const date  = card.querySelector('.ev-date').value;
      const time  = card.querySelector('.ev-time').value;
      const edate = card.querySelector('.ev-edate').value;
      const etime = card.querySelector('.ev-etime').value;
      const loc   = card.querySelector('.ev-loc').value.trim();
      const desc  = card.querySelector('.ev-desc').value.trim();

      if (!title || !date) { valid = false; return; }

      const isAllDay = !time;
      let dtstart, dtend, dttype;

      if (isAllDay) {
        dttype = ';VALUE=DATE';
        dtstart = date.replace(/-/g, '');
        if (edate) {
          dtend = edate.replace(/-/g, '');
        } else {
          const d = new Date(date);
          d.setDate(d.getDate() + 1);
          dtend = d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate());
        }
      } else {
        dttype = '';
        dtstart = toICSDate(date, time);
        dtend = toICSDate(edate || date, etime || time);
        if (!dtend || dtend === dtstart) {
          const d = new Date(date + 'T' + time);
          d.setHours(d.getHours() + 1);
          dtend = d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) +
                  'T' + pad(d.getHours()) + pad(d.getMinutes()) + '00';
        }
      }

      lines.push('BEGIN:VEVENT');
      lines.push('UID:' + uid());
      lines.push('DTSTAMP:' + toICSDate(new Date().toISOString().split('T')[0], new Date().toTimeString().substr(0,5)));
      lines.push('DTSTART' + dttype + ':' + dtstart);
      lines.push('DTEND'   + dttype + ':' + dtend);
      lines.push('SUMMARY:' + escapeICS(title));
      if (loc)  lines.push('LOCATION:'    + escapeICS(loc));
      if (desc) lines.push('DESCRIPTION:' + escapeICS(desc));
      lines.push('END:VEVENT');
    });

    if (!valid) {
      alert('Bitte bei jedem Termin Titel und Datum ausfüllen.');
      return;
    }

    lines.push('END:VCALENDAR');

    const content = lines.join('\r\n');
    const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = calname.replace(/[^a-z0-9äöü]/gi, '_') + '.ics';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  // Start with one empty event
  addEvent({ date: new Date().toISOString().split('T')[0] });
</script>
</body>
</html>
